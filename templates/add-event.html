<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event erstellen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="container">
        <h1>Neues Event erstellen</h1>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="titel">Titel *</label>
                <input type="text" id="titel" name="titel" required>
            </div>

            <div class="form-group">
                <label for="datum">Datum *</label>
                <!-- Der Date Picker -->
                <input type="date" id="datum" name="datum" required>
            </div>

            <div class="form-group">
                <label for="beschreibung">Beschreibung (Optional)</label>
                <textarea id="beschreibung" name="beschreibung" rows="4"></textarea>
            </div>

            <button type="submit" class="btn">Event speichern</button>
            <a href="{{ url_for('home') }}" class="btn" style="background-color: #95a5a6;">Abbrechen</a>
        </form>
    </div>
</body>
</html>
