<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event erstellen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="container">
        <h1>Neues Event erstellen</h1>

            <!--
                Flash-Messages: Zeigt Rückmeldungen vom Server an (z.B. Erfolgs- oder Fehlermeldungen).
                Nutzt die in Flask gesetzten Kategorien für das CSS-Styling.
            -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="flash-message {{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

        <!--
            Formular sendet Daten via POST an die Route 'create_event'.
            POST wird gewählt, um Daten sicher an den Server zu übertragen und die Datenbank zu verändern.
        -->
        <form action="{{ url_for('create_event') }}" method="POST">
            <div class="form-group">
                <label for="titel">Titel *</label>
                <!-- 'name="titel"' ist der Schlüssel, mit dem Flask auf den Wert zugreift (request.form['titel']) -->
                <input type="text" id="titel" name="titel" required>
            </div>

            <div class="form-group">
                <label for="datum">Datum *</label>
                <!--
                    HTML5 Date Picker: Erzwingt ein gültiges Datumsformat (YYYY-MM-DD)
                    und verbessert die User Experience durch einen nativen Kalender-Dialog.
                -->
                <input type="date" id="datum" name="datum" required>
            </div>

            <div class="form-group">
                <label for="beschreibung">Beschreibung (Optional)</label>
                <!-- Mehrzeiliges Textfeld für zusätzliche Details zum Termin -->
                <textarea id="beschreibung" name="beschreibung" rows="4"></textarea>
            </div>

            <!-- Absenden-Button: Löst die Formularvalidierung und den POST-Request aus -->
            <button type="submit" class="btn">Event speichern</button>

            <!-- Abbrechen-Button: Führt den Nutzer ohne Speichern zurück zur Startseite -->
            <a href="{{ url_for('home') }}" class="btn" style="background-color: #95a5a6;">Abbrechen</a>
        </form>
    </div>
</body>
</html>
