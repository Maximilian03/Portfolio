<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventkalender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="container">
        <h1>Event Kalender</h1>

        <!-- Buttons zum Umschalten -->
        <div class="view-toggle">
            <button id="btn-list" class="active" onclick="switchView('list')">Listenansicht</button>
            <button id="btn-cal" onclick="switchView('calendar')">Kalenderansicht</button>
        </div>

        <!-- ================= LISTENANSICHT ================= -->
        <div id="view-list">
            <table>
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Titel</th>
                        <th>Beschreibung</th>
                    </tr>
                </thead>
                <tbody>
                    {% for event in events %}
                    <tr>
                        <td>{{ event.datum }}</td>
                        <td><a href="{{ url_for('event_detail', event_id=event.id) }}" style="text-decoration: none; color: #3498db;"><strong>{{ event.titel }}</strong></a></td>
                        <td>{{ event.beschreibung }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3">Aktuell sind keine Events geplant.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- ================= KALENDERANSICHT ================= -->
        <div id="view-calendar" style="display: none;">

            <!-- Die Kalender Navigation -->
            <div class="calendar-nav">
                <button onclick="changeMonth(-1)">&#10094; Zurück</button>
                <h3 class="calendar-header" id="cal-month-year"></h3>
                <button onclick="changeMonth(1)">Vor &#10095;</button>
            </div>

            <div class="calendar-grid" id="cal-grid">
                <!-- Wird durch JavaScript gefüllt -->
            </div>
        </div>

        <br>
        <a href="{{ url_for('create_event') }}" class="btn">Neues Event erstellen</a>
    </div>

    <!-- JavaScript für den Kalender und das Umschalten -->
    <script>
        const events = {{ events | tojson }};

        // NEU: Wir speichern den aktuellen Monat und das Jahr global
        let displayDate = new Date();
        let currentMonth = displayDate.getMonth();
        let currentYear = displayDate.getFullYear();

        function switchView(view) {
            if (view === 'list') {
                document.getElementById('view-list').style.display = 'block';
                document.getElementById('view-calendar').style.display = 'none';
                document.getElementById('btn-list').classList.add('active');
                document.getElementById('btn-cal').classList.remove('active');
            } else {
                document.getElementById('view-list').style.display = 'none';
                document.getElementById('view-calendar').style.display = 'block';
                document.getElementById('btn-cal').classList.add('active');
                document.getElementById('btn-list').classList.remove('active');
                renderCalendar();
            }
        }

        // Funktion zum Blättern der Monate
        function changeMonth(step) {
            currentMonth += step;
            // Wenn wir über den Dezember hinausgehen
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            // Wenn wir vor den Januar gehen
            else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('cal-grid');
            const monthYearLabel = document.getElementById('cal-month-year');

            const dayNames = `<div class="calendar-day-name">Mo</div><div class="calendar-day-name">Di</div><div class="calendar-day-name">Mi</div><div class="calendar-day-name">Do</div><div class="calendar-day-name">Fr</div><div class="calendar-day-name">Sa</div><div class="calendar-day-name">So</div>`;
            grid.innerHTML = dayNames;

            const monthNames = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];

            // hier werden die Variablen currentMonth und currentYear genutzt
            monthYearLabel.innerText = monthNames[currentMonth] + " " + currentYear;

            let firstDay = new Date(currentYear, currentMonth, 1).getDay();
            firstDay = firstDay === 0 ? 6 : firstDay - 1;

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="calendar-day empty"></div>`;
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dayString = i < 10 ? '0' + i : i;
                const monthString = (currentMonth + 1) < 10 ? '0' + (currentMonth + 1) : (currentMonth + 1);
                const dateString = `${currentYear}-${monthString}-${dayString}`;

                let eventHtml = '';
                events.forEach(event => {
                    if(event.datum === dateString) {
                        eventHtml += `<a href="/event/${event.id}" class="event-badge" style="text-decoration:none;">${event.titel}</a>`;
                    }
                });

                grid.innerHTML += `
                    <div class="calendar-day">
                        <span class="date-num">${i}</span>
                        ${eventHtml}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
